<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Room - RecruitPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            height: 100vh;
            margin: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            max-width: 80%;
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
        }
        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .message.user {
            align-self: flex-end;
            background: var(--neon-cyan);
            color: #000;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }
        .input-area {
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 1rem;
        }
        .btn-send {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .typing-indicator {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <header class="header glass-panel-no-border">
        <div class="logo">
            <i data-lucide="infinity" class="logo-icon text-cyan"></i>
            <h2>RecruitPro <span>AI Interview</span></h2>
        </div>
        <div class="status-badge" style="display: flex; align-items: center; gap: 8px;">
            <span class="dot-cyan pulse"></span>
            <span>Live Session</span>
        </div>
    </header>

    <main class="chat-container" id="chat-container">
        <!-- Messages will appear here -->
    </main>

    <div class="input-area">
        <div class="input-wrapper">
            <div id="typing" class="typing-indicator">AI is thinking...</div>
            <input type="text" id="user-input" placeholder="Type your response here..." autocomplete="off">
            <button class="btn-primary glow-cyan btn-send" id="send-btn">
                <i data-lucide="send"></i>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');
        
        const urlParams = new URLSearchParams(window.location.search);
        const candidateId = urlParams.get('id') || 'test-cand';

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.textContent = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (window.lucide) lucide.createIcons();
        }

        async function startInterview() {
            try {
                const response = await fetch('/api/interview/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ candidateId })
                });
                const data = await response.json();
                addMessage('ai', data.message);
            } catch (err) {
                addMessage('ai', "Error connecting to AI. Please refresh.");
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/api/interview/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ candidateId, message: text })
                });
                const data = await response.json();
                typingIndicator.style.display = 'none';
                addMessage('ai', data.message);
                
                if (data.completed) {
                    userInput.disabled = true;
                    sendBtn.disabled = true;
                }
            } catch (err) {
                typingIndicator.style.display = 'none';
                addMessage('ai', "Communication lost. Please try again.");
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        startInterview();
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
